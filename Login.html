<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agromarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page">
        <section class="left-panel">
            <div class="logo-wrap">
                <img class="logo-image" src="/image/WhatsApp Image 2026-03-14 at 11.29.15 PM.jpeg"
                    alt="Agromarket Logo">
                <p class="logo-label">AGROMARKET</p>
            </div>

            <h1 class="title">Login</h1>
            <p class="subtitle">Enter your account details</p>

            <form class="form" action="#" method="post">
                <input class="field" type="email" placeholder="Enter your email" aria-label="Email">

                <div class="password-row">
                    <input class="field" type="password" placeholder="Enter your password" aria-label="Password">
                    <!-- <button class="eye-btn" type="button" aria-label="Show password"></button> -->
                </div>

                <button class="login-btn" type="submit">Login</button>
                <a class="forgot" href="#">Forgot Password?</a>
            </form>

            <div class="bottom-row">
                <p>Don't have an account?</p>
                <a class="signup-btn" href="Registration.html">Sign up</a>
            </div>
        </section>

        <section class="right-panel">
            <img class="right-image" src="https://earthagrichem.com/wp-content/uploads/2025/05/OUR-1024x1024.jpg"
                alt="Right side image">
        </section>
    </main>
</body>

</html>
